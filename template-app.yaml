AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ReactiveBridge - Stateless Compute Stack

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Tracing: Active

Resources:
  ReactiveBridgeQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ReactiveBridgeQueue

  EventProcessorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      CodeUri: cmd/processor/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Environment:
        Variables:
          # Dynamically imports the table name from the stateful stack
          TABLE_NAME: !ImportValue ReactiveBridge-TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !ImportValue ReactiveBridge-TableName
        - SQSPollerPolicy:
            QueueName: !GetAtt ReactiveBridgeQueue.QueueName
      Events:
        QueueTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt ReactiveBridgeQueue.Arn
            BatchSize: 10